services:
  backend:
    image: ghcr.io/proxcentb/mathboard-backend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 3001
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    image: ghcr.io/proxcentb/mathboard-frontend:${IMAGE_TAG:-latest}
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
