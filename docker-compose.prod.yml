services:
  backend:
    image: ghcr.io/proxcentb/mathboard-backend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 3001
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-1gb}
      SOCKET_MAX_HTTP_BUFFER_SIZE: ${SOCKET_MAX_HTTP_BUFFER_SIZE:-1073741824}
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    image: ghcr.io/proxcentb/mathboard-frontend:${IMAGE_TAG:-latest}
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
